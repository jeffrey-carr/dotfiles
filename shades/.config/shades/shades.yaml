socket-path: "/tmp/theme-change.sock"
defaultLightTheme: "rose-pine;dawn"
defaultDarkTheme: "rose-pine;main"
daemon:
  enabled-components:
    - "fzf"
    - "ghostty"
    - "mac"
    - "tmux"
client:
  ghostty:
    path: "~/.config/ghostty/theme-current.conf"
  fzf:
    theme: >
      --color=fg:{FG},fg+:{YELLOW},bg:-1,bg+:{BG0}
      --color=hl:{YELLOW},hl+:{RED},info:{YELLOW},marker:{FG}
      --color=prompt:{GREEN},spinner:{YELLOW},pointer:{YELLOW},header:{YELLOW},label:{FG},query:{PURPLE}
      --border="none"
      --height="30%"
      --layout="reverse"
      --info="hidden"
  tmux:
    status-bg: "default"
    status-fg: "{FG}"
    window-status-format: " #I:#W "
    window-status-current-format: "#[fg={PURPLE}]#[fg={BG0},bg={PURPLE},bold]#I:#W#[bg=default,fg={PURPLE},nobold]"
    status-left: "#{?client_prefix,#[fg=red]#[bg=red]#[fg={BG0}]󰠠 #S#[bg=default]#[fg=red] ,#[fg={PURPLE}]#[bg={PURPLE}]#[fg={BG0}]#[bold]󰇄 #S#[bg=default]#[nobold]#[fg={PURPLE}] } "
    status-right: "#{?#($HOME/.tmux_scripts/tmux-spotify-info),#[fg={GREEN}]#[bg={GREEN}]#[fg={BG0}]#($HOME/.tmux_scripts/tmux-spotify-info)#[bg=default]#[fg={GREEN}] ,}#[fg={BLUE}]#[bg={BLUE}]#[fg={BG0}]󰥔 %H:%M#[bg=default]#[fg={BLUE}] #[fg={PURPLE}]#[bg={PURPLE}]#[fg={BG0}]󰃭 %Y-%m-%d#[bg=default]#[fg={PURPLE}]"
