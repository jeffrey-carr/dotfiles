# ~/.tmux.conf

# -----------------------------------------------------------------------------
# 🛠️ CORE CONFIG
# -----------------------------------------------------------------------------

# Rebind prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Base index for windows and panes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Window merging/unmerging
unbind m
bind m split-window -h \; select-pane -t :+ \; choose-tree -w "join-pane -h -s '%%' \; last-pane \; kill-pane \; select-layout even-horizontal"
# Unmerge the focused pane using prefix + U
unbind u
bind u break-pane

# Mouse support
set -g mouse on

# Vim-like navigation
# h/l to switch windows (tabs), j/k to switch panes (if split)
bind h previous-window
bind l next-window
bind j select-pane -D
bind k select-pane -U

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB:Ss=\\E[%p1%d q:Se=\\E[2 q"

# Reduce escape time for Neovim
set -sg escape-time 10

# -----------------------------------------------------------------------------
# 🎨 LOOK & FEEL (Hyper-Modern)
# -----------------------------------------------------------------------------

# 1. Static Pane Config
set -g pane-border-status top
set -g pane-border-lines single

# 2. Status Bar Design
set -g status-position top
set -g status-justify left
set -g status-style bg=default,fg=white
set -g status-left-length 100
set -g status-right-length 100

# 3. Leader Key Indicator (Prefix)
# "Pill" design: turns RED when prefix is active, uses theme accent otherwise.
# The theme accent color is overridden by tmux_theme.conf (sourced at end of file).
# This blue fallback is only visible before the theme file loads.
set -g status-left "#{?client_prefix,#[fg=red]#[bg=red]#[fg=black]󰠠 #S#[bg=default]#[fg=red] ,#[fg=blue]#[bg=blue]#[fg=black]#[bold]󰇄 #S#[bg=default]#[nobold]#[fg=blue] } "

# 4. Window Status (The "Animatic" feel)
set -g window-status-format "#[fg=brightblack] #I:#W "
# (Current window format is dynamically sourced via tmux_theme.conf below)

# Message styling
set -g message-style bg=magenta,fg=black,bold

# 5. Theme Sourcing
# Dynamic status bar styling is fully managed by the shades daemon client.
