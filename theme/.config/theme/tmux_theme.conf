# Pane Styling
set -g pane-border-format " #[fg=cyan]#[fg=white,bg=cyan,bold] #P #[bg=default,fg=cyan,nobold] "
set -g pane-active-border-style fg=cyan
set -g pane-border-style fg=brightwhite

# Window Status
set -g window-status-current-format "#[fg=cyan]î‚¶#[fg=white,bg=cyan,bold]#I:#W#[bg=default,fg=cyan,nobold]î‚´"

# Session Pill (fixed theme accent color; prefix state handled in .tmux.conf)
set -g status-left "#{?client_prefix,#[fg=red]î‚¶#[bg=red]#[fg=black]ó°   #S#[bg=default]#[fg=red]î‚´ ,#[fg=cyan]î‚¶#[bg=cyan]#[fg=black]#[bold]ó°‡„ #S#[bg=default]#[nobold]#[fg=cyan]î‚´ } "

# Status Right (System Info)
set -g status-right "#{?#($HOME/.tmux_scripts/tmux-spotify-info),#[fg=#1DB954]î‚¶#[bg=#1DB954]#[fg=black]#($HOME/.tmux_scripts/tmux-spotify-info)#[bg=default]#[fg=#1DB954]î‚´ ,}#[fg=blue]î‚¶#[bg=blue]#[fg=black]ó°¥” %H:%M#[bg=default]#[fg=blue]î‚´ #[fg=magenta]î‚¶#[bg=magenta]#[fg=black]ó°ƒ­ %Y-%m-%d#[bg=default]#[fg=magenta]î‚´"
